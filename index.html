<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WIKD OFF AIR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  width:100vw;
  overflow:hidden;
  background:url("images/wikd-background.jpg") center center / cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  text-align:center;
  font-family:'Anton', sans-serif;
  cursor:none;
}

/* TOP */
#announcement {
  font-size:15vw;
  color:#ff0000;
  line-height:0.9;
  text-shadow:0 0 60px black;
}

/* MIDDLE */
#sub {
  font-size:6vw;
  color:#ffd600;
  text-shadow:0 0 50px black;
}

/* HUGE TIMER */
#timer {
  font-size:7vw;
  color:#00ff4c;
  text-shadow:0 0 60px black;
  margin:1vh 0;
}

/* FACT */
#fact {
  font-size:5vw;
  color:white;
  text-shadow:0 0 60px black;
  padding:1vh 5vw;
  transition:opacity 0.4s ease;
  line-height:1.1;
}
</style>
</head>

<body>

<div id="announcement">STUDIO CLOSED</div>
<div id="sub">FOR REMODELING 🚧</div>
<div id="timer">OFF AIR FOR: 0 DAYS 00:00:00</div>
<div id="fact">Loading fact...</div>

<script>

/* ======================
   START TIME = TODAY 9AM
====================== */

const now = new Date();
const startDate = new Date(
  now.getFullYear(),
  now.getMonth(),
  now.getDate(),
  9, 0, 0
);

const timerEl = document.getElementById("timer");

function updateTimer() {
  const current = new Date();
  const diff = current - startDate;

  if (diff < 0) {
    timerEl.textContent = "OFF AIR BEGINS AT 9:00 AM";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  timerEl.textContent =
    `OFF AIR FOR: ${days} DAYS ` +
    `${String(hours).padStart(2,"0")}:` +
    `${String(minutes).padStart(2,"0")}:` +
    `${String(seconds).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

/* ======================
   MASSIVE FACT LIST
====================== */

const facts = [

  "WIKD BROADCASTS ON 102.5 FM IN DAYTONA BEACH.",
  "WIKD IS ENTIRELY STUDENT-RUN.",
  "THE CALLSIGN WIKD IS PRONOUNCED 'WICKED.'",
  "WIKD FIRST BEGAN FM BROADCASTING IN 2005.",
  "WIKD IS PART OF THE STUDENT GOVERNMENT ASSOCIATION.",
  "WIKD IS ONE OF THE LAST TRUE FREE-FORMAT RADIO STATIONS.",
  "WIKD IS HOME TO OVER 45 LIVE SHOWS A WEEK.",
  "WIKD HAS 9 BOARD POSITIONS.",
  "WIKD IS THE LARGEST SGA DIVISION.",
  "WIKD IS THE SPIRIT OF DAYTONA BEACH.",
  "WIKD PROVIDES HANDS-ON DJ TRAINING.",
  "WIKD GIVES STUDENTS REAL BROADCAST EXPERIENCE.",
  "WIKD SUPPORTS LOCAL EVENTS AND CAMPUS LIFE.",
  "WIKD HAS TRAINED GENERATIONS OF BROADCASTERS.",
  "WIKD IS BUILT BY STUDENTS, FOR STUDENTS.",

  "DJ FLYBY LUVS U ALL <3",
  "#NATELOVESODECK",
  "I MIGHT BE BIASED BUT WIKD IS THE BEST SGA DIVISION.",
  "IF YOU'RE READING THIS YOU SHOULD HOST A SHOW.",
  "THE STUDIO MAY BE CLOSED BUT THE ENERGY ISN'T.",
  "BIG THINGS ARE COMING.",
  "REMODEL ERA ACTIVATED.",
  "WIKD NEVER SLEEPS.",
  "THE REBUILD WILL BE LEGENDARY.",
  "THIS IS JUST A LEVEL UP.",
  "WIKD 2.0 LOADING...",
  "DAYTONA RUNS ON WIKD.",
  "IF YOU KNOW YOU KNOW.",
  "BOARD MEMBERS ARE BUILT DIFFERENT.",
  "WE'LL BE BACK LOUDER."
];

/* RANDOM ROTATION EVERY 20 SECONDS */
const factEl = document.getElementById("fact");

function rotateFact() {
  factEl.style.opacity = 0;

  setTimeout(() => {
    const randomIndex = Math.floor(Math.random() * facts.length);
    factEl.textContent = facts[randomIndex];
    factEl.style.opacity = 1;
  }, 300);
}

rotateFact();
setInterval(rotateFact, 20000);

</script>

</body>
</html>
