<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WIKD OFF AIR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  width:100vw;
  overflow:hidden;
  background:url("images/wikd-background.jpg") center center / cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  text-align:center;
  font-family:'Anton', sans-serif;
  cursor:none;
}

/* TOP */
#announcement {
  font-size:16vw;
  color:#ff0000;
  line-height:0.9;
  text-shadow:0 0 50px black;
}

/* MIDDLE */
#sub {
  font-size:6vw;
  color:#ffd600;
  text-shadow:0 0 40px black;
}

/* HUGE TIMER */
#timer {
  font-size:7vw;
  color:#00ff4c;
  text-shadow:0 0 50px black;
  margin:2vh 0;
}

/* BOTTOM FACT */
#fact {
  font-size:4.5vw;
  color:white;
  text-shadow:0 0 40px black;
  padding:2vh 5vw;
  transition:opacity 0.5s ease;
}
</style>
</head>

<body>

<div id="announcement">STUDIO CLOSED</div>
<div id="sub">FOR REMODELING 🚧</div>
<div id="timer">OFF AIR FOR: 0 DAYS 00:00:00</div>
<div id="fact">Loading fact...</div>

<script>

/* ======================
   START TIME = TODAY 9AM EST
====================== */

const now = new Date();
const startDate = new Date(
  now.getFullYear(),
  now.getMonth(),
  now.getDate(),
  9, 0, 0
);

const timerEl = document.getElementById("timer");

function updateTimer() {
  const current = new Date();
  const diff = current - startDate;

  if (diff < 0) {
    timerEl.textContent = "OFF AIR BEGINS AT 9:00 AM";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  timerEl.textContent =
    `OFF AIR FOR: ${days} DAYS ` +
    `${String(hours).padStart(2,"0")}:` +
    `${String(minutes).padStart(2,"0")}:` +
    `${String(seconds).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

/* ======================
   FACT ROTATION
====================== */

const facts = [
  "WIKD BROADCASTS ON 102.5 FM IN DAYTONA BEACH.",
  "WIKD IS ENTIRELY STUDENT-RUN.",
  "THE CALLSIGN WIKD IS PRONOUNCED 'WICKED.'",
  "WIKD FIRST BEGAN FM BROADCASTING IN 2005.",
  "STUDENTS CAN HOST THEIR OWN RADIO SHOW EACH SEMESTER.",
  "WIKD PROVIDES HANDS-ON DJ TRAINING."
];

const factEl = document.getElementById("fact");
let currentFact = 0;

function rotateFact() {
  factEl.style.opacity = 0;
  setTimeout(() => {
    factEl.textContent = facts[currentFact];
    factEl.style.opacity = 1;
    currentFact = (currentFact + 1) % facts.length;
  }, 400);
}

rotateFact();
setInterval(rotateFact,9000);

</script>

</body>
</html>
