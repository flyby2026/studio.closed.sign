<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WIKD Studio Update</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FUN FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: url("images/wikd-background.jpg") center center / cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: none;
}

/* Main container */
#container {
  width: 90%;
}

/* MASSIVE HEADLINE */
#announcement {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13vw; /* scales with screen */
  color: #ff1a1a; /* RED */
  letter-spacing: 6px;
  line-height: 0.9;
  text-shadow: 0 0 30px black;
  animation: pulse 2s infinite alternate;
}

/* Subheadline */
#sub {
  font-family: 'Montserrat', sans-serif;
  font-size: 4vw;
  font-weight: 900;
  color: #ffd600; /* YELLOW */
  margin-bottom: 60px;
  text-shadow: 0 0 25px black;
}

/* DID YOU KNOW */
#label {
  font-family: 'Montserrat', sans-serif;
  font-size: 3vw;
  font-weight: 900;
  color: #00ff4c; /* GREEN */
  margin-bottom: 20px;
  text-shadow: 0 0 20px black;
}

/* FACT TEXT HUGE */
#fact {
  font-family: 'Montserrat', sans-serif;
  font-size: 5vw;
  font-weight: 900;
  color: white;
  line-height: 1.2;
  text-shadow: 0 0 30px black;
  transition: opacity 0.6s ease;
}

/* Subtle glow animation */
@keyframes pulse {
  from { text-shadow: 0 0 20px rgba(0,0,0,0.9); }
  to { text-shadow: 0 0 40px rgba(255,0,0,0.8); }
}

/* Fullscreen Prompt */
#fullscreenPrompt {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.95);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Montserrat', sans-serif;
  font-size: 28px;
  z-index: 100;
}
</style>
</head>

<body>

<div id="fullscreenPrompt">
  CLICK TO ENTER FULLSCREEN<br>
  DOUBLE CLICK TO EXIT
</div>

<div id="container">
  <div id="announcement">STUDIO CLOSED</div>
  <div id="sub">FOR REMODELING 🚧</div>
  <div id="label">DID YOU KNOW?</div>
  <div id="fact">Loading facts…</div>
</div>

<script>
const facts = [
  "WIKD-LP broadcasts on 102.5 FM in Daytona Beach.",
  "WIKD is entirely student-run.",
  "The station first began FM broadcasting in 2005.",
  "The callsign WIKD is pronounced 'Wicked.'",
  "Students can host their own radio show each semester.",
  "WIKD provides hands-on DJ and production training.",
  "WIKD is part of the Embry-Riddle Student Government Association."
];

const factEl = document.getElementById("fact");
let current = 0;

function showFact(index) {
  factEl.style.opacity = 0;
  setTimeout(() => {
    factEl.textContent = facts[index];
    factEl.style.opacity = 1;
  }, 500);
}

function nextFact() {
  current = (current + 1) % facts.length;
  showFact(current);
}

showFact(current);
setInterval(nextFact, 10000);

/* Fullscreen controls */
document.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.getElementById("fullscreenPrompt").style.display = "none";
  }
});

document.addEventListener("dblclick", () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
    document.getElementById("fullscreenPrompt").style.display = "flex";
  }
});

document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
