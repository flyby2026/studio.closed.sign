<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WIKD Studio Update</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  font-family: Helvetica, Arial, sans-serif;
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  color: white;
  cursor: none;
  background: url("images/wikd-background.jpg") center center / cover no-repeat;
}

/* Main Layout */
#container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px;
}

/* BIG HEADLINE */
#announcement {
  font-size: 90px;
  font-weight: 900;
  color: #ff1a1a; /* RED */
  text-shadow: 0 0 25px rgba(0,0,0,0.9);
  margin-bottom: 30px;
}

/* Subheadline */
#sub {
  font-size: 42px;
  font-weight: 800;
  color: #ffd600; /* YELLOW */
  text-shadow: 0 0 20px rgba(0,0,0,0.9);
  margin-bottom: 50px;
}

/* Fact Box */
#factBox {
  max-width: 85%;
  transition: opacity 0.6s ease;
}

#label {
  font-size: 36px;
  font-weight: 900;
  color: #00ff4c; /* GREEN */
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(0,0,0,0.9);
}

#fact {
  font-size: 50px;
  font-weight: 700;
  line-height: 1.3;
  text-shadow: 0 0 25px rgba(0,0,0,0.9);
}

/* Fullscreen Prompt */
#fullscreenPrompt {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.95);
  color: #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  z-index: 100;
  text-align: center;
}
</style>
</head>

<body>

<div id="fullscreenPrompt">
  CLICK = ENTER FULLSCREEN<br>
  DOUBLE CLICK = EXIT
</div>

<div id="container">

  <div id="announcement">
    STUDIO CLOSED
  </div>

  <div id="sub">
    FOR REMODELING 🚧
  </div>

  <div id="factBox">
    <div id="label">DID YOU KNOW?</div>
    <div id="fact">Loading facts…</div>
  </div>

</div>

<script>
const facts = [
  "WIKD-LP broadcasts on 102.5 FM in Daytona Beach.",
  "WIKD is entirely student-run.",
  "The station first began FM broadcasting in 2005.",
  "The callsign WIKD is pronounced 'Wicked.'",
  "Students can host their own radio show each semester.",
  "WIKD provides hands-on DJ and production training.",
  "WIKD is part of the Embry-Riddle Student Government Association."
];

const factEl = document.getElementById("fact");
const factBox = document.getElementById("factBox");

let current = 0;

function showFact(index) {
  factBox.style.opacity = 0;
  setTimeout(() => {
    factEl.textContent = facts[index];
    factBox.style.opacity = 1;
  }, 600);
}

function nextFact() {
  current = (current + 1) % facts.length;
  showFact(current);
}

showFact(current);
setInterval(nextFact, 10000);

/* Fullscreen */
document.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.getElementById("fullscreenPrompt").style.display = "none";
  }
});

document.addEventListener("dblclick", () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
    document.getElementById("fullscreenPrompt").style.display = "flex";
  }
});

document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
